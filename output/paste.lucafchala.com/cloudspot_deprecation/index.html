<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cloudspot — paste.lucafchala.com</title>
    <meta name="theme-color" content="#0d0c0a">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script>(function(){document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark'})();</script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0d0c0a; --border: #252220; --text: #e6e1d6; --muted: #6a6358; --accent: #c08030; --accent-dim: #6a4818; --ctrl-bg: #161412; }
        [data-theme="light"] { --bg: #f4efe6; --border: #d8d1c4; --text: #1c1a17; --muted: #9a8f80; --accent: #a06820; --accent-dim: #c89050; --ctrl-bg: #ede8df; }
        html { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.75; -webkit-font-smoothing: antialiased; transition: background 0.25s, color 0.25s; }
        body { min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 48px 32px 72px; display: flex; flex-direction: column; justify-content: center; }
        header { margin-bottom: 40px; animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) both; }
        .slug { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 8vw, 56px); font-weight: 300; line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 12px; color: var(--muted); }
        .micro { color: var(--muted); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
        .rule { display: flex; align-items: center; gap: 16px; margin: 32px 0; color: var(--muted); font-size: 10px; letter-spacing: 0.1em; }
        .rule::before, .rule::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .content { animation: rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
        .msg { font-size: 14px; color: var(--muted); line-height: 1.9; margin-bottom: 24px; }
        .msg strong { color: var(--text); }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-size: 12px; }
        .back-link:hover { text-decoration: underline; }
        @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 540px) { body { padding: 32px 22px 52px; } }
    </style>
</head>

<body>

    <header>
        <h1 class="slug">Este link<br>foi atualizado.</h1>
        <p class="micro">paste.lucafchala.com</p>
    </header>

    <div class="rule">AVISO</div>

    <div class="content">
        <p class="msg">
            O serviço de galeria que hospedava essas fotos (<strong>Cloudspot</strong>) foi descontinuado.<br>
            As fotos foram migradas ou arquivadas. Entre em contato caso precise de acesso.
        </p>
        <a href="https://lucafchala.com/instagram" class="back-link">→ Instagram: @lucafchala</a>
    </div>

</body>
</html>
