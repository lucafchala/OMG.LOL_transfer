<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>tucas / omg.lol admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Tela de login (mostrada quando não autenticado) -->
    <div id="login" class="login hidden">
      <form id="login-form" class="login-box" autocomplete="off">
        <div class="login-brand">tucas<span class="accent">/</span>admin</div>
        <label class="field-label" for="login-password">senha</label>
        <input
          id="login-password"
          class="input"
          type="password"
          autocomplete="current-password"
          spellcheck="false"
        />
        <button id="login-submit" class="btn btn-primary" type="submit">
          <span class="btn-label">entrar</span>
          <span class="spinner hidden" aria-hidden="true"></span>
        </button>
        <div id="login-error" class="field-error"></div>
      </form>
    </div>

    <!-- App principal (mostrado quando autenticado) -->
    <div id="app" class="app hidden">
      <nav class="sidebar">
        <div class="brand">tucas<span class="accent">/</span>admin</div>
        <ul class="nav">
          <li>
            <button class="nav-item" data-section="web">
              <span class="nav-icon">▤</span><span class="nav-label">Homepage</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-section="pastes">
              <span class="nav-icon">❏</span><span class="nav-label">Pastes</span>
            </button>
          </li>
          <li>
            <button class="nav-item" data-section="purls">
              <span class="nav-icon">↗</span><span class="nav-label">PURLs</span>
            </button>
          </li>
        </ul>
        <button id="logout" class="nav-item nav-logout">
          <span class="nav-icon">⏻</span><span class="nav-label">sair</span>
        </button>
      </nav>

      <main id="main" class="main"></main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
